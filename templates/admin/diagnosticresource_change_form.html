{% extends "admin/change_form.html" %}

{% block submit_buttons_bottom %}
    {{ block.super }}
    {% csrf_token %}
    {% if original.id %}
        <a href="{% url 'admin:diagnosticresource_generate_report' object_id=original.id %}"
           class="button"
           target="_blank"
           style="margin-left: 10px; background-color: #4CAF50; color: white; padding: 10px; text-decoration: none; border-radius: 5px;">
           Generate Complete Report
        </a>
    {% else %}
        <span style="margin-left: 10px; color: red;">Save the object to generate the report.</span>
    {% endif %}
{% endblock %}
